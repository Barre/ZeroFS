name: jepsen-ha

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jepsen-ha:
    name: Run jepsen HA suite (leader/standby over MinIO)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Leiningen + FUSE + gnuplot
        run: |
          sudo apt-get update
          # fuse3: the test runs the multi-target FUSE mount. gnuplot: jepsen's
          # default perf checker shells out to it; without it the verdict drops
          # to :unknown.
          sudo apt-get install -y fuse3 gnuplot
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein \
            -o /usr/local/bin/lein
          sudo chmod +x /usr/local/bin/lein
          lein version

      - name: Build ZeroFS
        working-directory: zerofs
        run: cargo build --profile ci

      - name: Download MinIO + mc
        run: |
          mkdir -p "$RUNNER_TEMP/minio-bin"
          curl -fsSL https://dl.min.io/server/minio/release/linux-amd64/minio \
            -o "$RUNNER_TEMP/minio-bin/minio"
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc \
            -o "$RUNNER_TEMP/minio-bin/mc"
          chmod +x "$RUNNER_TEMP/minio-bin/minio" "$RUNNER_TEMP/minio-bin/mc"

      # The test self-manages MinIO (starts the server, creates the bucket) and the
      # FUSE mount, so only the binaries are needed here. lein exits non-zero on a
      # failed analysis; the grep is a backup against a 0-exit on an invalid result.
      - name: HA test (fsync, kill/heal nemesis)
        working-directory: jepsen/ha
        run: |
          lein run test \
            --time-limit 300 \
            --concurrency 10 \
            --zerofs-bin "$GITHUB_WORKSPACE/zerofs/target/ci/zerofs" \
            --minio-bin "$RUNNER_TEMP/minio-bin/minio" \
            --mc-bin "$RUNNER_TEMP/minio-bin/mc" \
            --work-dir "$RUNNER_TEMP/zerofs-ha-fsync" 2>&1 | tee fsync.log
          grep -q "Everything looks good" fsync.log

      - name: HA test (--no-fsync, semi-sync of un-fsynced writes)
        working-directory: jepsen/ha
        run: |
          lein run test \
            --time-limit 90 \
            --concurrency 10 \
            --no-fsync \
            --zerofs-bin "$GITHUB_WORKSPACE/zerofs/target/ci/zerofs" \
            --minio-bin "$RUNNER_TEMP/minio-bin/minio" \
            --mc-bin "$RUNNER_TEMP/minio-bin/mc" \
            --work-dir "$RUNNER_TEMP/zerofs-ha-nofsync" 2>&1 | tee nofsync.log
          grep -q "Everything looks good" nofsync.log

      # Node logs (a.log/b.log/minio.log/mount.log) live in the work-dir, not the
      # jepsen store; copy them in so the uploaded artifact captures them.
      - name: Collect node logs on failure
        if: failure()
        run: |
          mkdir -p jepsen/ha/store/node-logs
          for wd in zerofs-ha-fsync zerofs-ha-nofsync; do
            for f in "$RUNNER_TEMP/$wd"/*.log; do
              [ -e "$f" ] || continue
              cp "$f" "jepsen/ha/store/node-logs/$wd.$(basename "$f")"
            done
          done

      - name: Upload jepsen store on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jepsen-ha-store
          path: jepsen/ha/store
          if-no-files-found: ignore
