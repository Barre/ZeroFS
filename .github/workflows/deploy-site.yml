name: Deploy site

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "documentation/**"
      - "scripts/build-site.sh"
      - ".github/workflows/deploy-site.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "website/**"
      - "documentation/**"
      - "scripts/build-site.sh"
      - ".github/workflows/deploy-site.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: documentation/package-lock.json

      - name: Build site
        run: ./scripts/build-site.sh

      # main -> production (--branch=main matches the project's production
      # branch); any PR branch -> a preview deployment on its own URL.
      # Fork PRs can't read the secrets, so their deploy is skipped.
      - name: Deploy to Cloudflare Pages
        id: deploy
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website
            --project-name=zerofs
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const url = ${{ toJSON(steps.deploy.outputs.deployment-url) }}
            if (!url) return
            const marker = '<!-- cf-pages-preview -->'
            const body = `${marker}\n**Cloudflare Pages preview:** ${url}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find((c) => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
