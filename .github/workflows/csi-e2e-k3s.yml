name: CSI e2e (k3s)

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: k3s end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: zerofs-ci-bin
          path: zerofs/target/ci
      - run: chmod +x zerofs/target/ci/zerofs zerofs/target/ci/zerofs-csi

      - name: Build images
        run: |
          ctx=$(mktemp -d)
          cp zerofs/target/ci/zerofs zerofs/target/ci/zerofs-csi zerofs/zerofs-csi/e2e/Dockerfile "$ctx"
          docker build --target gateway -t zerofs:e2e "$ctx"
          docker build --target csi -t zerofs-csi:e2e "$ctx"

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sudo sh -s - --write-kubeconfig-mode 644
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_ENV"
          # `kubectl wait node --all` errors immediately ("no matching resources
          # found") if it runs before the node object registers, so wait for the
          # node to appear first, then wait on its Ready condition.
          for i in $(seq 1 60); do
            sudo k3s kubectl get nodes 2>/dev/null | grep -q ' Ready\| NotReady' && break
            sleep 2
          done
          sudo k3s kubectl wait node --all --for=condition=Ready --timeout=120s

      - name: Import images into k3s
        run: |
          docker save zerofs:e2e | sudo k3s ctr images import -
          docker save zerofs-csi:e2e | sudo k3s ctr images import -

      - name: Deploy MinIO
        run: |
          kubectl apply -f zerofs/zerofs-csi/e2e/minio.yaml
          kubectl -n zerofs rollout status deploy/minio --timeout=120s
          kubectl -n zerofs wait --for=condition=complete job/minio-mkbucket --timeout=120s

      # The gateway is an HA leader/standby pair (two StatefulSets over one
      # shared MinIO store). Readiness is gated on the replication port, which
      # both roles bind early; the standby binds 9P only after it takes over.
      - name: Deploy gateway
        run: |
          kubectl apply -f zerofs/zerofs-csi/e2e/gateway.yaml
          kubectl -n zerofs rollout status statefulset/zerofs-gateway-a --timeout=120s
          kubectl -n zerofs rollout status statefulset/zerofs-gateway-b --timeout=120s

      # The shipped manifests are applied as-is except for the image, which
      # points at the locally imported build (`:e2e` defaults to
      # imagePullPolicy IfNotPresent, so nothing is pulled).
      - name: Deploy CSI driver
        working-directory: zerofs/zerofs-csi
        run: |
          kubectl apply -f deploy/csidriver.yaml -f deploy/rbac.yaml
          sed 's|ghcr.io/barre/zerofs-csi:latest|docker.io/library/zerofs-csi:e2e|' deploy/controller.yaml | kubectl apply -f -
          sed 's|ghcr.io/barre/zerofs-csi:latest|docker.io/library/zerofs-csi:e2e|' deploy/node.yaml | kubectl apply -f -
          kubectl apply -f deploy/storageclass-example.yaml
          kubectl -n zerofs rollout status deployment/zerofs-csi-controller --timeout=180s
          # The node DaemonSet uses OnDelete (so upgrades don't restart every FUSE
          # mount), which `kubectl rollout status` rejects; wait on readiness instead.
          kubectl -n zerofs wait --for=jsonpath='{.status.numberReady}'=1 \
            daemonset/zerofs-csi-node --timeout=180s

      - name: Provision and mount (RWX across two pods)
        run: |
          kubectl apply -f zerofs/zerofs-csi/e2e/workload.yaml
          kubectl wait --for=condition=Ready pod/writer pod/reader --timeout=180s
          kubectl exec writer -- sh -c 'echo zerofs-e2e-payload > /data/hello.txt'
          content=$(kubectl exec reader -- cat /data/hello.txt)
          test "$content" = "zerofs-e2e-payload"

      # Published FUSE mounts survive a leader failover.
      # Find the serving leader (its 9P port accepts connections; a standby
      # refuses until it takes over) and delete it: the standby promotes,
      # epoch-fencing the old leader, and the mounts follow it with no remount.
      # Discovering the leader rather than assuming node-a keeps the test correct
      # even if the cold-start role race resolves the other way.
      - name: Leader failover survives published mounts
        run: |
          leader=""
          for n in a b; do
            if kubectl exec writer -- sh -c "nc -w3 zerofs-gateway-$n.zerofs.svc 5564 </dev/null" 2>/dev/null; then
              leader=$n
              break
            fi
          done
          test -n "$leader" || { echo "no serving leader found among the gateways"; exit 1; }
          echo "serving leader is node-$leader; deleting it to force failover"
          kubectl -n zerofs delete pod "zerofs-gateway-$leader-0"
          # The writer overwrites after the failover; its mount blocks through
          # the takeover gap and re-routes to the promoted leader. The reader (a
          # separate mount on the same RWX volume) observes it within the
          # write-through attribute-cache window. Both stalls are bounded by the
          # takeover TTL, so allow generous time.
          timeout 180 kubectl exec writer -- sh -c 'echo after-failover > /data/hello.txt'
          content=""
          for i in $(seq 1 60); do
            content=$(timeout 30 kubectl exec reader -- cat /data/hello.txt 2>/dev/null || true)
            [ "$content" = "after-failover" ] && break
            sleep 2
          done
          test "$content" = "after-failover"

      - name: Delete reclaims the volume
        run: |
          pv=$(kubectl get pvc e2e-data -o jsonpath='{.spec.volumeName}')
          kubectl delete -f zerofs/zerofs-csi/e2e/workload.yaml --timeout=120s
          kubectl wait pv "$pv" --for=delete --timeout=120s

      # Always: component logs with timestamps make slow (not just failed)
      # runs attributable, e.g. how long a failover actually took.
      - name: Debug dump
        if: always()
        run: |
          set +e
          kubectl get pods -A -o wide
          kubectl get pv,pvc -A
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 50
          kubectl describe pod writer reader
          kubectl -n zerofs logs -l app=zerofs-gateway --all-containers --prefix \
            --timestamps --tail=100 --max-log-requests=6
          kubectl -n zerofs logs deployment/zerofs-csi-controller --all-containers --timestamps --tail=100
          kubectl -n zerofs logs daemonset/zerofs-csi-node --all-containers --timestamps --tail=100
