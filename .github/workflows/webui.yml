name: WebUI

on:
  push:
    branches: ["main"]
    paths:
      - "webui/**"
      - "zerofs/ninep-client/**"
      - "zerofs/ninep-proto/**"
      - "zerofs/zerofs-client/**"
      - "zerofs/zerofs-client-web/**"
      - "zerofs/src/webui.rs"
      - "zerofs/Cargo.toml"
      - "zerofs/Cargo.lock"
      - "zerofs/proto/**"
      - "Makefile"
  pull_request:
    branches: ["main"]
    paths:
      - "webui/**"
      - "zerofs/ninep-client/**"
      - "zerofs/ninep-proto/**"
      - "zerofs/zerofs-client/**"
      - "zerofs/zerofs-client-web/**"
      - "zerofs/src/webui.rs"
      - "zerofs/Cargo.toml"
      - "zerofs/Cargo.lock"
      - "zerofs/proto/**"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: npm ci
      - run: npx buf generate
      - run: cargo check --target wasm32-unknown-unknown -p zerofs-client
        working-directory: zerofs
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2.82.9
        with:
          tool: wasm-pack@0.15.0
          fallback: none
      - name: Install VM image build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools squashfs-tools
      - run: make webui
      - name: Test shared WASM client over WebSocket
        run: cargo test -p zerofs --features webui webui::tests::wasm_client_smoke -- --ignored
        working-directory: zerofs
