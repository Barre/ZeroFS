syntax = "proto3";

package zerofs.replication;

// Semi-synchronous leader-to-standby replication. A mutation becomes visible
// after the standby buffers its batch. Promotion replays the buffered tail.
service ReplicationService {
    rpc Replicate(ReplicateRequest) returns (ReplicateResponse);
    // Acknowledges each accepted heartbeat with its writer epoch.
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    // Reports whether a starting peer must defer writer initialization.
    rpc Hello(HelloRequest) returns (HelloResponse);
}

message ReplOp {
    bytes key = 1;
    bytes value = 2; // ignored when delete is true
    bool delete = 3;
    // Sealed frame bytes ([len][sealed]) for an extent-write Put whose segment
    // remains in the leader's open buffer. Empty for other operations.
    bytes frame = 4;
}

// Completed mutation result keyed by operation ID. `result` is a versioned
// ZeroFS payload returned verbatim for a retry.
message DedupEntry {
    bytes op_id = 1; // exactly 16 bytes
    bytes result = 2;
}

message ReplicateRequest {
    uint64 seqno = 1;
    // Deduped mutations (last-write-wins per key), in apply order.
    repeated ReplOp ops = 2;
    // Highest buffered sequence the standby may discard. Zero discards none.
    uint64 prune_watermark = 3;
    // Leader data-database writer epoch. Values below the receiver's highest
    // observed epoch are rejected.
    uint64 writer_epoch = 4;
    reserved 5;
    // Results remain volatile until covered by a prune watermark or replay.
    repeated DedupEntry dedup_entries = 6;
}

message ReplicateResponse {
    // Tag 1 was `bool accepted`; an old sender would decode any nonzero enum
    // value at this tag as acceptance.
    reserved 1;
    ReplicateDisposition disposition = 2;
}

enum ReplicateDisposition {
    // Invalid response value. Also identifies an omitted disposition.
    REPLICATE_DISPOSITION_UNSPECIFIED = 0;
    ACCEPTED = 1;
    // The sender's writer epoch has been superseded.
    SENDER_DEPOSED = 2;
    // The receiver cannot account for every earlier ship in this writer term.
    // The sender must first make that missing base durable and retry with a
    // watermark that covers it.
    BASE_NOT_COVERED = 3;
}

message HeartbeatRequest {
    // Leader data-database writer epoch. Values below the receiver's highest
    // observed epoch are ignored.
    uint64 writer_epoch = 1;
    reserved 2; // legacy SlateDB-local sequence; it carried no coverage proof.
    // Highest ship attempt the leader has applied locally in this writer term.
    uint64 applied_through = 3;
    // Highest applied attempt proven durable in shared storage. Must not exceed
    // applied_through. The receiver may account for later attempts from its tail.
    uint64 durable_through = 4;
    // Required HA protocol version. Zero cannot establish coverage or liveness.
    uint32 protocol_version = 5;
}

message HeartbeatResponse {
    // Exact writer epoch accepted by this standby. Zero denotes no accepted epoch.
    uint64 accepted_writer_epoch = 1;
    // Required HA protocol version. Zero does not acknowledge an epoch.
    uint32 protocol_version = 2;
}

message HelloRequest {
    // Required HA protocol version. A zero-version caller is told to defer.
    uint32 protocol_version = 1;
}

message HelloResponse {
    // True requires the caller to defer writer initialization.
    bool peer_active = 1;
    // Responder node identity. It must differ from the caller because it keys
    // the latest-leader record.
    string node_id = 2;
    // Required HA protocol version. Zero is invalid for role election.
    uint32 protocol_version = 3;
}
