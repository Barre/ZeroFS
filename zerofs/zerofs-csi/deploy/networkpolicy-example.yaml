# Lockdown for the gateway pair (gateway-example.yaml). Neither 9P nor admin is
# authenticated, so network reachability is the only trust boundary.
# One policy selects both gateway pods (app: zerofs-gateway); selecting them
# denies all other ingress, so these rules are the whole allow-list.
#
#   - 9P (5564) is the data plane. The aname is client-chosen and not a security
#     boundary. Restricted to the CSI node pods.
#   - admin RPC (7000) is a root-equivalent control plane (runs as uid 0, can
#     trash any volume). Restricted to the CSI controller pod.
#   - replication (9000) is the leader -> standby stream, heartbeats, and role
#     discovery. Restricted to the gateway pods themselves (each ships to the
#     other).
#
# Caveat: a NetworkPolicy is a no-op on a CNI that does not enforce them (e.g.
# vanilla flannel / default k3s). On such a cluster there is no in-cluster
# protection; do not expose the gateways to untrusted pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zerofs-gateway
  namespace: zerofs
spec:
  podSelector:
    matchLabels:
      app: zerofs-gateway
  policyTypes:
    - Ingress
  ingress:
    # Data plane: 9P, from every node plugin.
    - ports:
        - port: 5564
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: zerofs-csi-node
    # Control plane: admin RPC, from the controller only.
    - ports:
        - port: 7000
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: zerofs-csi-controller
    # Replication: leader -> standby ship + heartbeats, between the gateways.
    - ports:
        - port: 9000
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: zerofs-gateway
